<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아리하위키</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; display: flex; margin: 0; height: 100vh; background-color: #f4f4f9; color: #333; }
        
        /* 사이드바 스타일 (목록 제거됨) */
        .sidebar { width: 250px; background-color: #2c3e50; color: white; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; flex-shrink: 0;}
        .sidebar h2 { margin-top: 0; border-bottom: 2px solid #34495e; padding-bottom: 10px; font-size: 20px;}
        
        .search-box { width: 100%; padding: 10px 12px; margin-bottom: 25px; border: none; border-radius: 5px; box-sizing: border-box; background-color: #1a252f; color: white; font-family: inherit; font-size: 14px; transition: 0.2s;}
        .search-box::placeholder { color: #7f8c8d; }
        .search-box:focus { outline: 2px solid #3498db; background-color: #0f161c;}

        /* 메뉴 버튼 스타일 */
        .btn-menu { color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 15px; font-weight: bold; margin-bottom: 8px;}
        .btn-gallery { background-color: #8e44ad; }
        .btn-gallery:hover { background-color: #9b59b6; }
        .btn-add { background-color: #27ae60; }
        .btn-add:hover { background-color: #2ecc71; }
        .btn-backup { background-color: #f39c12; margin-top: 10px;}
        .btn-backup:hover { background-color: #e67e22; }
        .btn-restore { background-color: #d35400; }
        .btn-restore:hover { background-color: #e67e22; }
        
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; scroll-behavior: smooth; }
        .wiki-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 850px; margin: 0 auto; display: flex; flex-direction: column; }
        
        /* 갤러리 뷰 스타일 */
        .gallery-header { margin-top: 0; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px;}
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .gallery-item { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid #eee;}
        .gallery-item:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.15); border-color: #ccc;}
        .gallery-img-wrapper { width: 100%; height: 200px; background-color: #eee; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .gallery-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-info { padding: 15px; text-align: center; }
        .gallery-name { font-weight: bold; font-size: 18px; margin-bottom: 5px; color: #2c3e50;}
        .gallery-role { font-size: 13px; color: #7f8c8d; }

        .filter-banner { background-color: #e8f4f8; border: 1px solid #bce8f1; color: #31708f; padding: 15px; border-radius: 5px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold;}
        .btn-clear-filter { background-color: #31708f; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 13px;}
        .btn-clear-filter:hover { background-color: #245269; }

        /* 열람 모드 (Read View) 레이아웃 */
        .read-title-group { margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .read-name { font-size: 36px; font-weight: bold; margin: 0 0 5px 0; color: #2c3e50; }
        .read-role { font-size: 18px; color: #7f8c8d; margin: 0 0 15px 0; }
        
        /* 분류 박스 */
        .category-box { border: 1px solid #ccc; padding: 10px 15px; border-radius: 4px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; font-size: 14px; background-color: #fdfdfd;}
        .category-label { font-weight: bold; color: #2c3e50; }
        .category-tag { color: #0645ad; cursor: pointer; text-decoration: none; display: flex; align-items: center;}
        .category-tag:hover { text-decoration: underline; color: #0b0080;}
        .category-separator { color: #ccc; margin: 0 2px; }

        .top-layout-group { display: flex; gap: 30px; margin-bottom: 40px; align-items: flex-start; }
        .left-content-group { flex: 1; display: flex; flex-direction: column; gap: 20px;}
        
        .toc-container { border: 1px solid #a2a9b1; background-color: #f8f9fa; padding: 15px 20px; border-radius: 5px; display: inline-block; min-width: 280px; width: fit-content;}
        .toc-title { font-weight: bold; font-size: 18px; text-align: center; margin-bottom: 10px; border-bottom: 1px solid #ccc; padding-bottom: 5px;}
        .toc-list { list-style: none; padding-left: 0; margin: 0; line-height: 1.8;}
        .toc-list li a { text-decoration: none; color: #0645ad; font-size: 15px;}
        .toc-list li a:hover { text-decoration: underline; }

        /* 인포박스 영역 */
        .right-info-group { flex: 0 0 380px; display: flex; flex-direction: column; gap: 10px;}
        .read-profile-img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; object-fit: cover; background-color: #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex-shrink: 0; border: 1px solid #ddd;}
        
        .info-table { width: 100%; border-collapse: collapse; background-color: #f8f9fa; border-radius: 8px; overflow: hidden; border: 1px solid #e9ecef; table-layout: fixed;}
        .info-table th, .info-table td { padding: 10px 12px; border-bottom: 1px solid #e9ecef; font-size: 14px; word-break: break-all;}
        .info-table th { width: 25%; text-align: left; background-color: #e9ecef; color: #495057; font-weight: bold;}
        .info-table tr:last-child th, .info-table tr:last-child td { border-bottom: none; }
        
        /* 🆕 텍스트 꾸미기 렌더링 스타일 */
        .read-sections-container { border-top: 1px solid #eee; padding-top: 20px;}
        .wiki-section { margin-bottom: 40px; }
        .wiki-section-title { font-size: 26px; color: #2c3e50; border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 20px; margin-top: 0;}
        .wiki-section-content { line-height: 1.7; font-size: 16px; color: #34495e; white-space: pre-wrap; word-break: keep-all;}
        .wiki-section-content strong { color: #000; font-weight: 800; }
        .wiki-section-content mark { background-color: #ffeaa7; padding: 2px 5px; border-radius: 3px; color: #d35400; font-weight: bold;}
        .wiki-section-content blockquote { border-left: 5px solid #3498db; margin: 15px 0; padding: 10px 15px; background-color: #f4f8fa; color: #555; border-radius: 0 5px 5px 0;}
        .wiki-section-content a { color: #2980b9; text-decoration: none; font-weight: bold;}
        .wiki-section-content a:hover { text-decoration: underline; color: #1c5980;}

        /* 편집 모드 (Edit View) 스타일 */
        .profile-header { display: flex; align-items: center; margin-bottom: 20px; }
        .image-uploader { width: 150px; height: 150px; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); object-fit: cover; background-color: #eee; margin-right: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0;}
        .image-uploader img { width: 100%; height: 100%; object-fit: cover; display: none;}
        .image-uploader .placeholder { color: #888; text-align: center; font-size: 14px;}
        
        input[type="text"], textarea { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        
        .custom-field-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .custom-field-row input { margin-bottom: 0; }
        .custom-field-row .label-input { width: 30%; font-weight: bold; background-color: #f8f9fa; border-color: #bbb;}
        .custom-field-row .value-input { width: 70%; }
        .btn-remove-field { background-color: #e74c3c; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; transition: 0.2s;}
        
        .section-edit-block { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 15px; position: relative;}
        .section-edit-block textarea { min-height: 120px; resize: vertical; margin-bottom: 0;}
        .section-edit-block input { font-weight: bold; font-size: 16px; margin-bottom: 10px;}
        .btn-remove-section { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; border: none; border-radius: 3px; padding: 5px 10px; cursor: pointer; font-size: 12px;}
        
        /* 🆕 텍스트 꾸미기 안내 문구 */
        .md-help { font-size: 13px; color: #7f8c8d; margin-bottom: 5px; background: #fff; display: inline-block; padding: 4px 8px; border-radius: 4px; border: 1px solid #e1e1e1;}
        .md-help code { background: #eee; padding: 2px 4px; border-radius: 3px; color: #c0392b;}

        .btn-add-dashed { background-color: #ecf0f1; color: #2c3e50; border: 2px dashed #bdc3c7; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 20px; transition: 0.2s;}
        .btn-add-dashed:hover { background-color: #e2e6e8; border-color: #95a5a6; }

        .button-group { display: flex; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 2px solid #eee;}
        .btn { background-color: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.2s; font-weight: bold;}
        .btn:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-cancel { background-color: #95a5a6; }
        .btn-cancel:hover { background-color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>메뉴</h2>
        
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 이름 또는 역할 검색..." oninput="performSearch()">

        <button class="btn-menu btn-gallery" onclick="clearFilterAndShowGallery()">🗂️ 전체 갤러리 보기</button>
        <button class="btn-menu btn-add" onclick="createNew()">+ 새 문서 작성</button>
        
        <h3 style="font-size: 15px; margin-top: auto; margin-bottom: 10px; border-bottom: 1px solid #34495e; padding-bottom: 5px;">데이터 관리</h3>
        <button class="btn-menu btn-backup" onclick="exportData()">💾 백업하기</button>
        <button class="btn-menu btn-restore" onclick="document.getElementById('importInput').click()">📂 불러오기</button>
        <input type="file" id="importInput" accept=".json" style="display: none;" onchange="importData(event)">
    </div>

    <div class="main-content">
        
        <div id="galleryView">
            <h1 class="gallery-header">캐릭터 갤러리</h1>
            
            <div id="filterBanner" class="filter-banner" style="display: none;">
                <span>현재 <strong>[<span id="currentFilterText"></span>]</strong> 분류의 문서만 보고 있습니다.</span>
                <button class="btn-clear-filter" onclick="clearFilterAndShowGallery()">전체 보기 (필터 해제)</button>
            </div>

            <div class="gallery-grid" id="galleryGrid"></div>
        </div>

        <div class="wiki-card" id="readView" style="display: none;">
            <div class="read-title-group">
                <h1 class="read-name" id="readName">이름</h1>
                <p class="read-role" id="readRole">역할</p>
                <div id="readCategoriesBox" class="category-box" style="display: none;"></div>
            </div>

            <div class="top-layout-group">
                <div class="left-content-group">
                    <div id="readTocContainer" class="toc-container" style="display: none;">
                        <div class="toc-title">목차</div>
                        <ul class="toc-list" id="readTocList"></ul>
                    </div>
                </div>

                <div class="right-info-group">
                    <img id="readImage" class="read-profile-img" src="" alt="Profile Image" style="display: none;">
                    <table class="info-table" id="readCustomFieldsTable"></table>
                </div>
            </div>

            <div id="readSectionsContainer" class="read-sections-container"></div>

            <div class="button-group">
                <button class="btn" onclick="editCurrentCharacter()">✏️ 문서 편집하기</button>
            </div>
        </div>

        <div class="wiki-card" id="editView" style="display: none;">
            <h1 id="formTitle" style="margin-top: 0; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px;">문서 편집</h1>
            
            <div class="profile-header">
                <div class="image-uploader" id="imageUploader" onclick="document.getElementById('charImageInput').click()">
                    <span class="placeholder" id="imagePlaceholder">📷<br>클릭하여<br>이미지 등록</span>
                    <img id="charImagePreview" src="" alt="Profile Image">
                </div>
                <input type="file" id="charImageInput" accept="image/*" style="display: none;" onchange="previewImage()">
                
                <div style="flex-grow: 1;">
                    <label><strong>문서 제목 (이름)</strong></label>
                    <input type="text" id="charName" placeholder="캐릭터 이름">
                    
                    <label><strong>핵심 요약 (직업/역할)</strong></label>
                    <input type="text" id="charRole" placeholder="예: 창조신, 프로그래머, 작곡가 등">
                </div>
            </div>

            <label><strong>분류 (태그)</strong></label>
            <input type="text" id="charCategories" placeholder="쉼표(,)로 구분해서 입력해주세요. (예: 인간, 프로그래머, 주인공)">

            <label><strong>정보 박스 (자유 항목)</strong></label>
            <div id="customFieldsContainer"></div>
            <button class="btn-add-dashed" onclick="addCustomField()">+ 정보 박스 항목 추가 (예: 나이, 소속 등)</button>

            <label><strong>본문 문단 작성</strong></label>
            <div id="sectionsEditContainer"></div>
            <button class="btn-add-dashed" onclick="addSectionEditBlock()">+ 새 문단 추가 (예: 개요, 작중 행적, 능력 등)</button>

            <div class="button-group">
                <button class="btn" onclick="saveCharacter()">💾 문서 저장</button>
                <button class="btn btn-cancel" onclick="cancelEdit()">취소</button>
                <button class="btn btn-danger" style="margin-left: auto;" onclick="deleteCharacter()" id="deleteBtn">🗑️ 삭제</button>
            </div>
        </div>
    </div>

    <script>
        // 텍스트 꾸미기가 적용된 샘플 데이터
        const initialData = [
            { id: 1, name: "모나드", role: "최초의 아이온", image: null, categories: ["아이온", "창조자"], customFields: [ { label: "성별", value: "없음" }, { label: "창조 방식", value: "프로그래밍" } ], sections: [ { title: "개요", content: "프로그래밍을 통해 세계를 창조하는 **신**이다." }, { title: "성격 및 특징", content: "일반적인 상식으로는 이해하기 힘든 ==4차원적인 성격==을 지니고 있다." } ] },
            { id: 2, name: "우에하라 츠바사", role: "학생", image: null, categories: ["인간", "학생"], customFields: [ { label: "성별", value: "남자아이" }, { label: "선호 복장", value: "메이드복" } ], sections: [ { title: "개요", content: "학교에 다니는 귀여운 소년." }, { title: "특징", content: "평소 메이드복을 즐겨 입는 ~~이상한~~ 독특한 취향을 가지고 있다." } ] },
            { id: 3, name: "라니야 샤힌", role: "파이썬/IoT 프로그래머", image: null, categories: ["인간", "프로그래머", "개발자"], customFields: [ { label: "성격", value: "내향적" }, { label: "주력 언어", value: "Python" }, { label: "개발한 AI", value: "RAZIEL" } ], sections: [ { title: "개요", content: "고도의 집중력을 지닌 천재적인 파이썬 및 IoT 시스템 프로그래머." }, { title: "작중 행적 및 AI 개발", content: "자신을 돕는 인공지능 비서 **'RAZIEL'**을 직접 개발하였다.\n\n평소에는 내향적이고 수줍음이 많지만 코딩을 할 때만큼은 ==무서운 집중력==을 보여준다.\n\n> 에헤헤... 나 지금 파이썬 코딩 집중하는 중이니까... 쪼오끔만 조용히 해줄래...? 힝... 부탁할게에~" } ] },
            { id: 4, name: "인티사르 에이사", role: "사후세계의 작곡가", image: null, categories: ["사후세계", "작곡가", "여성"], customFields: [ { label: "나이", value: "18세" }, { label: "국적", value: "팔레스타인" } ], sections: [ { title: "개요", content: "사후세계에서 활동하고 있는 천재적인 18세 작곡가 소녀." }, { title: "생애 및 활동", content: "생전에는 대한민국에서 살았던 경험이 있다. 현재는 사후세계의 한 아늑한 카페를 무대로 삼아 아름다운 음악을 작곡하며 사람들을 위로하고 있다." } ] }
        ];

        let characters = [];
        let currentImageBase64 = null;
        let viewingCharId = null; 
        let currentCategoryFilter = null; 
        let searchQuery = ''; 

        function loadData() {
            const saved = localStorage.getItem('myCharacters');
            if (saved) { characters = JSON.parse(saved); } else { characters = initialData; saveToLocalStorage(); }
            showGallery(); 
        }
        function saveToLocalStorage() { localStorage.setItem('myCharacters', JSON.stringify(characters)); }

        function hideAllViews() {
            document.getElementById('galleryView').style.display = 'none';
            document.getElementById('readView').style.display = 'none';
            document.getElementById('editView').style.display = 'none';
        }

        function performSearch() {
            searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            // 검색 시 무조건 갤러리 뷰로 이동하여 결과 표시
            if (document.getElementById('galleryView').style.display !== 'block') {
                hideAllViews();
                document.getElementById('galleryView').style.display = 'block';
            }
            renderGallery();
        }

        function filterByCategory(category) { currentCategoryFilter = category; showGallery(); }
        
        function clearFilterAndShowGallery() {
            currentCategoryFilter = null;
            document.getElementById('searchInput').value = '';
            searchQuery = '';
            showGallery();
        }

        function showGallery() { 
            hideAllViews(); 
            document.getElementById('galleryView').style.display = 'block'; 
            viewingCharId = null; 
            renderGallery(); 
        }

        function renderGallery() { 
            const grid = document.getElementById('galleryGrid'); 
            const banner = document.getElementById('filterBanner');
            grid.innerHTML = ''; 

            let displayCharacters = characters;

            if (currentCategoryFilter) {
                displayCharacters = displayCharacters.filter(c => c.categories && c.categories.includes(currentCategoryFilter));
                document.getElementById('currentFilterText').textContent = currentCategoryFilter;
                banner.style.display = 'flex';
            } else { banner.style.display = 'none'; }

            if (searchQuery) {
                displayCharacters = displayCharacters.filter(c => {
                    const nameMatch = (c.name || '').toLowerCase().includes(searchQuery);
                    const roleMatch = (c.role || '').toLowerCase().includes(searchQuery);
                    return nameMatch || roleMatch;
                });
            }

            displayCharacters.forEach(char => { 
                const item = document.createElement('div'); 
                item.className = 'gallery-item'; 
                item.onclick = () => loadCharacter(char.id); 
                const imgHtml = char.image ? `<img src="${char.image}" alt="${char.name}">` : `<span style="color: #ccc; font-size: 40px;">👤</span>`; 
                item.innerHTML = `<div class="gallery-img-wrapper">${imgHtml}</div><div class="gallery-info"><div class="gallery-name">${char.name || '이름 없음'}</div><div class="gallery-role">${char.role || '-'}</div></div>`; 
                grid.appendChild(item); 
            }); 
            
            if (displayCharacters.length === 0) {
                grid.innerHTML = '<p style="color: #7f8c8d; padding: 20px;">조건에 맞는 캐릭터가 없습니다.</p>';
            }
        }

        // 🆕 커스텀 마크다운 파서 함수
        function parseMarkdown(text) {
            if (!text) return '';
            // 1. 태그 무력화 (XSS 방지 및 레이아웃 깨짐 방지)
            let html = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            // 2. 인용구 (Blockquote) 변환: '> 내용' 형태
            html = html.replace(/^(?:&gt;|>)\s?(.*)$/gm, '<blockquote>$1</blockquote>');
            
            // 3. 굵게 (Bold): **내용**
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            
            // 4. 기울임 (Italic): *내용*
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            
            // 5. 취소선 (Strikethrough): ~~내용~~
            html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');
            
            // 6. 형광펜 (Highlight): ==내용==
            html = html.replace(/==(.+?)==/g, '<mark>$1</mark>');

            return html;
        }

        function loadCharacter(id) {
            const char = characters.find(c => c.id === id);
            if (!char) return;
            viewingCharId = char.id;

            document.getElementById('readName').textContent = char.name || '이름 없음';
            document.getElementById('readRole').textContent = char.role || '역할 미상';

            const catBox = document.getElementById('readCategoriesBox');
            if (char.categories && char.categories.length > 0) {
                let html = `<span class="category-label">분류:</span>`;
                char.categories.forEach((cat, idx) => {
                    html += `<a class="category-tag" onclick="filterByCategory('${cat}')">${cat}</a>`;
                    if(idx < char.categories.length - 1) html += `<span class="category-separator">|</span>`;
                });
                catBox.innerHTML = html;
                catBox.style.display = 'flex';
            } else { catBox.style.display = 'none'; }

            const readImage = document.getElementById('readImage');
            if (char.image) {
                readImage.src = char.image; readImage.style.display = 'block';
            } else { readImage.style.display = 'none'; }

            const table = document.getElementById('readCustomFieldsTable');
            table.innerHTML = '';
            if (char.customFields && char.customFields.length > 0) {
                char.customFields.forEach(field => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<th>${field.label}</th><td>${field.value}</td>`;
                    table.appendChild(tr);
                });
                table.style.display = 'table';
            } else { table.style.display = 'none'; }

            const tocContainer = document.getElementById('readTocContainer');
            const tocList = document.getElementById('readTocList');
            const sectionsContainer = document.getElementById('readSectionsContainer');
            tocList.innerHTML = ''; sectionsContainer.innerHTML = '';
            
            if (char.sections && char.sections.length > 0) {
                tocContainer.style.display = 'inline-block';
                char.sections.forEach((sec, index) => {
                    const secId = `section-${index}`;
                    const tocLi = document.createElement('li');
                    tocLi.innerHTML = `<a href="javascript:void(0)" onclick="document.getElementById('${secId}').scrollIntoView({behavior: 'smooth'})">${index + 1}. ${sec.title}</a>`;
                    tocList.appendChild(tocLi);
                    
                    const secDiv = document.createElement('div'); secDiv.className = 'wiki-section'; secDiv.id = secId;
                    
                    // 🆕 렌더링 시 parseMarkdown 함수 적용
                    const parsedContent = parseMarkdown(sec.content);
                    
                    secDiv.innerHTML = `<h2 class="wiki-section-title">${index + 1}. ${sec.title}</h2><div class="wiki-section-content">${parsedContent}</div>`;
                    sectionsContainer.appendChild(secDiv);
                });
            } else { tocContainer.style.display = 'none'; }

            hideAllViews();
            document.getElementById('readView').style.display = 'block';
            document.querySelector('.main-content').scrollTop = 0; 
        }

        function editCurrentCharacter() { 
            if (!viewingCharId) return; const char = characters.find(c => c.id === viewingCharId); if (!char) return; 
            document.getElementById('charName').value = char.name || ''; 
            document.getElementById('charRole').value = char.role || ''; 
            document.getElementById('charCategories').value = char.categories ? char.categories.join(', ') : '';
            document.getElementById('customFieldsContainer').innerHTML = ''; 
            if (char.customFields) { char.customFields.forEach(field => addCustomField(field.label, field.value)); } 
            document.getElementById('sectionsEditContainer').innerHTML = ''; 
            if (char.sections) { char.sections.forEach(sec => addSectionEditBlock(sec.title, sec.content)); } 
            if (char.image) { document.getElementById('charImagePreview').src = char.image; document.getElementById('charImagePreview').style.display = 'block'; document.getElementById('imagePlaceholder').style.display = 'none'; currentImageBase64 = char.image; } else { resetImagePreview(); } 
            document.getElementById('formTitle').innerText = '📝 문서 편집'; document.getElementById('deleteBtn').style.display = 'inline-block'; hideAllViews(); document.getElementById('editView').style.display = 'block'; 
        }

        function createNew() { 
            viewingCharId = null; 
            document.getElementById('charName').value = ''; 
            document.getElementById('charRole').value = ''; 
            document.getElementById('charCategories').value = ''; 
            document.getElementById('customFieldsContainer').innerHTML = ''; 
            document.getElementById('sectionsEditContainer').innerHTML = ''; addSectionEditBlock('개요', ''); 
            resetImagePreview(); 
            document.getElementById('formTitle').innerText = '✨ 새 문서 작성'; document.getElementById('deleteBtn').style.display = 'none'; hideAllViews(); document.getElementById('editView').style.display = 'block'; 
        }

        function addCustomField(label = '', value = '') { const container = document.getElementById('customFieldsContainer'); const row = document.createElement('div'); row.className = 'custom-field-row'; row.innerHTML = `<input type="text" class="label-input" placeholder="항목명" value="${label}"><input type="text" class="value-input" placeholder="내용" value="${value}"><button class="btn-remove-field" onclick="this.parentElement.remove()" title="항목 삭제">❌</button>`; container.appendChild(row); }
        
        // 🆕 문단 편집 영역에 꾸미기 힌트 추가
        function addSectionEditBlock(title = '', content = '') { 
            const container = document.getElementById('sectionsEditContainer'); 
            const block = document.createElement('div'); 
            block.className = 'section-edit-block'; 
            block.innerHTML = `
                <button class="btn-remove-section" onclick="this.parentElement.remove()">삭제</button>
                <input type="text" class="section-title" placeholder="문단 제목" value="${title}">
                <div class="md-help">💡 텍스트 꾸미기: <code>**굵게**</code>, <code>*기울임*</code>, <code>~~취소선~~</code>, <code>==형광펜==</code>, <code>> 인용구</code></div>
                <textarea class="section-content" placeholder="이 문단에 들어갈 내용을 적어주세요...">${content}</textarea>
            `; 
            container.appendChild(block); 
        }
        
        function saveCharacter() { 
            const cfRows = document.querySelectorAll('.custom-field-row'); 
            const customFieldsArray = Array.from(cfRows).map(row => ({ label: row.querySelector('.label-input').value.trim(), value: row.querySelector('.value-input').value.trim() })).filter(field => field.label || field.value); 
            const secBlocks = document.querySelectorAll('.section-edit-block'); 
            const sectionsArray = Array.from(secBlocks).map(block => ({ title: block.querySelector('.section-title').value.trim() || '제목 없음', content: block.querySelector('.section-content').value.trim() })).filter(sec => sec.content); 
            
            const catRaw = document.getElementById('charCategories').value;
            const categoriesArray = catRaw.split(',').map(s => s.trim()).filter(s => s !== '');

            const newChar = { 
                name: document.getElementById('charName').value, 
                role: document.getElementById('charRole').value, 
                categories: categoriesArray, 
                image: currentImageBase64, 
                customFields: customFieldsArray, 
                sections: sectionsArray 
            }; 
            
            if (viewingCharId) { 
                const index = characters.findIndex(c => c.id === viewingCharId); 
                if (index !== -1) { characters[index] = { ...characters[index], ...newChar }; } 
            } else { 
                newChar.id = Date.now(); characters.push(newChar); viewingCharId = newChar.id; 
            } 
            saveToLocalStorage(); loadCharacter(viewingCharId); 
        }

        function cancelEdit() { if (viewingCharId) { loadCharacter(viewingCharId); } else { showGallery(); } }
        function deleteCharacter() { if (!viewingCharId) return; if(confirm("정말로 이 문서를 삭제할까요?")) { characters = characters.filter(c => c.id !== viewingCharId); saveToLocalStorage(); showGallery(); } }
        function previewImage() { const fileInput = document.getElementById('charImageInput'); const reader = new FileReader(); reader.onload = function(e) { document.getElementById('charImagePreview').src = e.target.result; document.getElementById('charImagePreview').style.display = 'block'; document.getElementById('imagePlaceholder').style.display = 'none'; currentImageBase64 = e.target.result; }; if (fileInput.files[0]) reader.readAsDataURL(fileInput.files[0]); }
        function resetImagePreview() { document.getElementById('charImagePreview').src = ''; document.getElementById('charImagePreview').style.display = 'none'; document.getElementById('imagePlaceholder').style.display = 'block'; document.getElementById('charImageInput').value = ''; currentImageBase64 = null; }
        function exportData() { if (characters.length === 0) { alert("백업할 데이터가 없습니다."); return; } const dataStr = JSON.stringify(characters, null, 2); const blob = new Blob([dataStr], { type: "application/json" }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = "my_character_wiki_backup.json"; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); }
        function importData(event) { const reader = new FileReader(); reader.onload = function(e) { try { const importedData = JSON.parse(e.target.result); if (Array.isArray(importedData)) { if(confirm("현재 작성된 데이터에 덮어쓰거나 추가됩니다. 계속하시겠습니까?")) { characters = importedData; saveToLocalStorage(); showGallery(); alert("성공적으로 데이터를 복구했습니다!"); } } else { alert("잘못된 형식의 파일입니다."); } } catch (error) { alert("파일을 읽는 중 오류가 발생했습니다."); } event.target.value = ''; }; if (event.target.files[0]) reader.readAsText(event.target.files[0]); }
        
        window.onload = loadData;
    </script>
</body>
</html>
